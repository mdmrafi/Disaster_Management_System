# =========================================================
# Render Blueprint — Disaster Management System
#
# Provisions three resources in one click:
#   1) disaster-db       — managed MySQL
#   2) disaster-api      — Spring Boot backend (Docker)
#   3) disaster-frontend — React/Vite SPA (Static Site)
#
# Deploy:
#   1. Push this file to your GitHub repo (default branch).
#   2. In Render:  New  ->  Blueprint  ->  pick the repo.
#   3. Render reads render.yaml and creates all three services.
#
# After the first deploy, set the secret env vars listed in
# docs/DEPLOY.md (or override the placeholders below).
# =========================================================

services:
  # ---- Backend: Spring Boot on Docker -------------------------
  - type: web
    name: disaster-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "10000"
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://${disaster-db.host}:3306/${disaster-db.database}?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: ${disaster-db.username}
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: disaster-db
          property: password
      - key: SECURITY_JWT_SECRET
        sync: false
      - key: SECURITY_JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://disaster-frontend.onrender.com

databases:
  - name: disaster-db
    plan: starter
    databaseName: disaster_db
    user: disaster_user

  # ---- Frontend: React/Vite Static Site ----------------------
  - type: web
    name: disaster-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://disaster-api.onrender.com/api