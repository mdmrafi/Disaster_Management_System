# =========================================================
# Disaster Management API configuration
# Edit the datasource block to match your local MySQL setup.
# =========================================================

spring.application.name=disaster-management

# --- Datasource (MySQL) -----------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=415139

# --- JPA / Hibernate --------------------------------------
# We manage schema and triggers via the SQL files in /db,
# so ddl-auto is set to "none" to avoid Hibernate fighting
# with our hand-written DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Server -----------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# --- Auth (JWT, HS256) -----------------------------------
# The secret below is 64 random bytes (base64-encoded). It is suitable for
# local development only — rotate it before any non-dev deployment.
security.jwt.secret=ZmFjYWQ4OWJlYjU4OWM5YjRiOTg5M2Q5M2E2M2NkMzE0N2YyYjdlYjQ5OGY0YjczZTk2OTRiZGEyN2M2M2NhYw==
security.jwt.expiration-ms=86400000
